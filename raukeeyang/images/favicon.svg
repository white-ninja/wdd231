<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Barn structure -->
  <rect x="20" y="40" width="60" height="50" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  <!-- Roof -->
  <polygon points="15,40 50,15 85,40" fill="#A0522D" stroke="#8B4513" stroke-width="1"/>
  <!-- Door -->
  <rect x="42" y="65" width="16" height="25" fill="#654321"/>
  <!-- Windows -->
  <rect x="25" y="50" width="12" height="12" fill="#87CEEB"/>
  <rect x="63" y="50" width="12" height="12" fill="#87CEEB"/>
  <!-- Ground -->
  <rect x="0" y="85" width="100" height="15" fill="#228B22"/>
</svg>